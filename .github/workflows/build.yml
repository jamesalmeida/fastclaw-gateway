name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Notify Sheldn of new image tag
        if: github.ref == 'refs/heads/main'
        env:
          DOCKER_WEBHOOK_SECRET: ${{ secrets.DOCKER_WEBHOOK_SECRET }}
        run: |
          SHA_TAG=$(echo "${{ github.sha }}" | head -c 7)
          curl -sf -X POST https://www.sheldn.ai/api/webhooks/docker \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $DOCKER_WEBHOOK_SECRET" \
            -d "{\"tag\": \"$SHA_TAG\", \"sha\": \"${{ github.sha }}\"}" || echo "Webhook notification failed (non-fatal)"
